<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUME | Editorial Bento</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Inter:wght@300;400;600&family=Geist:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>
    <div class="app-layout">
        <header class="top-nav">
            <h1>Ask <span class="text-glow">LUME</span></h1>
            <button class="nav-menu-btn" aria-label="Menu">≡</button>
        </header>

        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar block-panel">
                <div class="sidebar-header">
                    <h2>Chat History</h2>
                    <button id="new-chat-btn" class="icon-btn" title="New Chat">＋</button>
                </div>
                <div class="history-list" id="history-list">
                    <!-- Dynamically populated -->
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area block-panel">
                <div class="chat-header">
                    <h2>Agency Chat</h2>
                </div>
                <div id="chat-window">
                    <!-- Chat bubbles will go here -->
                </div>

                <section class="interaction-area">
                    <div class="input-container glass-input">
                        <input type="text" id="user-input" placeholder="Enter command..." autocomplete="off">
                        <button id="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z" />
                            </svg>
                        </button>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal-content bento-card">
            <h3 class="modal-title">Delete <span id="delete-entity-type">Contact</span></h3>
            <p class="modal-desc">This action cannot be undone. All associated records will be permanently deleted.</p>
            <label class="modal-label">To verify, type <strong id="delete-target-name"></strong> below:</label>
            <input type="text" id="delete-verify-input" class="modal-input" autocomplete="off">
            <div class="modal-actions">
                <button id="cancel-delete-btn" class="action-btn">Cancel</button>
                <button id="confirm-delete-btn" class="action-btn danger-btn" disabled>Confirm Delete</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
